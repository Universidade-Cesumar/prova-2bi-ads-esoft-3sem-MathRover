<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Almoxarifado</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <h1 id="title">Sistema de controle Almoxarifado</h1>

    <h2 id="produtos">Cadastro de produtos</h2>

    <label for="input-nome">Nome do material:</label>
    <input id="input-nome" type="text" placeholder="Digite o nome do produto">

    <br><br>

    <label for="input-quantidade">Quantidade:</label>
    <input id="input-quantidade" type="number" placeholder="Digite a quantidade">

    <br><br>

    <button id="btn-cadastrar">Cadastrar</button>

    <br><br>

        <table id="lista-materiais">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome do Material</th>
                <th>Quantidade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>


    <script src="main.js"></script>
</body>
</html>
